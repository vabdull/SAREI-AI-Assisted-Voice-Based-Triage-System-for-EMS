# ═══════════════════════════════════════════════════════════════════════════
# Arabic negation particles. A symptom match is marked as NEGATED if one of
# these tokens appears in a short word-window BEFORE the matched span.
# Negated matches do not count toward triage but are still surfaced as
# evidence (marked negated=true) for the dispatcher.
# ═══════════════════════════════════════════════════════════════════════════
negation:
  particles:
    - "ما"
    - "مو"
    - "مش"
    - "لا"
    - "ليس"
    - "بدون"
    - "غير"
    - "ماعاد"
    - "ماعنده"
    - "ماعنده"
  window_tokens: 3
