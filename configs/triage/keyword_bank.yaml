  - id: poisoning
    category: toxicology
    esi: 2
    weight: 8
    description_ar: "تسمم"
    # NOTE (audit 2026-05): the bare 2-character entry ``سم`` was
    # removed from ``universal``. With substring matching it collided
    # with the standalone word ``اسمي`` (= "my name is"), painting
    # the dispatcher's transcript as "poisoning". The remaining
    # phrases are token-aligned and unambiguous:
    #   • "تسمم" / "سموم"           — direct symptom mentions
    #   • "اكل سم" / "شرب سم"        — phrases anchored by a verb
    # The matcher's token-aware Pass 1 catches all the real cases
    # via these multi-token phrases.
    phrases:
      msa: ["تسمم", "تناول ماده سامه", "تسمم غذائي حاد"]
      najdi: ["تسمم", "اكل سم", "شرب ماده سامه", "تسمم من اكل"]
      hijazi: ["اتسمم", "شرب حاجه غلط", "اكل سم"]
      khaleeji: ["تسمم", "شرب سم", "تسمم من اكل"]
      universal: ["تسمم", "سموم"]

