  # ─── Canonical bare-symptom concepts (audit 2026-05) ───────────────────
  # Single-token Arabic medical keywords. These guarantee that natural
  # dispatcher phrases like "فيني صداع" / "عندي نزيف" highlight the
  # symptom word even when the more specific concept (severe_headache,
  # uncontrolled_bleeding, …) doesn't match. They are deliberately
  # low-priority (ESI 4, low weight) so they never override a more
  # specific concept's triage colour — the rule engine still picks the
  # most critical ESI per case.
  #
  # Safe because the matcher is now token-aware: "صداع" matches the
  # standalone token only, NOT inside "صداعا" or "وصداع" unless clitic
  # stripping applies. Each entry is at least 4 characters so it isn't
  # vulnerable to the historical substring-collision class of bug.

  - id: headache_generic
    category: neurological
    esi: 4
    weight: 2
    description_ar: "صداع"
    phrases:
      universal: ["صداع"]

  - id: bleeding_generic
    category: trauma
    esi: 3
    weight: 4
    description_ar: "نزيف"
    phrases:
      universal: ["نزيف"]

  - id: breathing_generic
    category: respiratory
    esi: 4
    weight: 3
    description_ar: "تنفس"
    phrases:
      universal: ["تنفس"]

  - id: chest_generic
    category: cardiac
    esi: 4
    weight: 3
    description_ar: "صدر"
    phrases:
      # "صدر" alone is 3 chars — covered safely by the token-aware
      # matcher (no false matches inside "صدري", "صدرها" without the
      # clitic strip producing a too-short stem).
      universal: ["صدر"]

