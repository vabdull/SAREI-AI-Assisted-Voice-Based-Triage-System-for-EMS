# EMS Arabic Triage Keyword Bank
# ───────────────────────────────────────────────────────────────────────────
# Phrases are written in NORMALIZED Arabic to match the ASR output:
#   - no tashkeel (ً ٌ ٍ َ ُ ِ ّ ْ stripped)
#   - alef unified to ا (no أ إ آ ٱ)
#   - ya unified to ي (no ى)
#   - ta marbuta unified to ه (no ة)
#   - tatweel ـ stripped
# The loader still normalizes at load time so unnormalized edits are safe.
#
# ESI: 1 (critical) → 5 (non-urgent). Mapped to red/yellow/green by rules.py:
#   ESI 1-2 → red, ESI 3 → yellow, ESI 4-5 → green
#
# Dialects: msa = Modern Standard Arabic, najdi, hijazi, khaleeji.
# "universal" = phrases that span all dialects or are unmistakable.

version: 1

meta:
  description: "EMS Arabic symptom bank covering the full scope of prehospital emergencies"
  normalization_applied: true
  triage_scale: "ESI-1-5"
  dialects: [msa, najdi, hijazi, khaleeji, universal]

