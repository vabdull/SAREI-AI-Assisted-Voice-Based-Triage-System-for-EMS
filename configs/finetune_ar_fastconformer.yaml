# Fine-tune NVIDIA's pretrained Arabic FastConformer on SADA
# Dialects: Najdi + Hijazi + Khaleeji
# Text source: SADA cleaned_text -> manifests_ems_dialects

name: "FastConformer-Arabic-SADA-Finetune"

pretrained_model: "nvidia/stt_ar_fastconformer_hybrid_large_pcd_v1.0"
data_dir: "data"

dialect_eval:
  enabled: true
  dialects: ["najdi", "hijazi", "khaleeji"]

training_logging:
  log_predictions: false
  use_cer_during_fit: false
  ctc_decoding_strategy: "greedy_batch"

metric_logging:
  decoder_types: ["rnnt", "ctc"]
  error_rates: ["wer", "cer"]
  log_predictions: false

model:
  train_ds:
    manifest_filepath: "manifests_ems_dialects/train_manifest.json"
    sample_rate: 16000
    batch_size: 8
    num_workers: 4
    pin_memory: true
    trim_silence: false
    max_duration: 20.0
    min_duration: 0.3
    shuffle: true
    is_tarred: false

  validation_ds:
    manifest_filepath: "manifests_ems_dialects/validation_manifest.json"
    sample_rate: 16000
    batch_size: 8
    num_workers: 4
    pin_memory: true
    max_duration: 20.0
    min_duration: 0.3
    shuffle: false

  test_ds:
    manifest_filepath: "manifests_ems_dialects/test_manifest.json"
    sample_rate: 16000
    batch_size: 8
    num_workers: 4
    pin_memory: true
    max_duration: 20.0
    min_duration: 0.3
    shuffle: false

  optim:
    name: adamw
    lr: 1.0e-4
    betas: [0.9, 0.98]
    weight_decay: 1.0e-4
    sched:
      name: CosineAnnealing
      warmup_steps: 1000
      warmup_ratio: null
      min_lr: 1.0e-6

  # Avoid the Numba RNNT loss backend, which is unstable in this WSL setup.
  loss:
    loss_name: default

  # Lighter than scratch training, but still regularizes enough for SADA.
  spec_augment:
    _target_: nemo.collections.asr.modules.SpectrogramAugmentation
    freq_masks: 2
    freq_width: 27
    time_masks: 5
    time_width: 0.05

trainer:
  devices: 1
  accelerator: "gpu"
  max_epochs: 30
  accumulate_grad_batches: 8
  gradient_clip_val: 1.0
  precision: "bf16-mixed"
  enable_checkpointing: false
  logger: false
  log_every_n_steps: 50
  val_check_interval: 1.0
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 0
  deterministic: false

exp_manager:
  exp_dir: "experiments"
  name: ${name}
  create_tensorboard_logger: true
  create_wandb_logger: false

  checkpoint_callback_params:
    monitor: "val_wer"
    mode: "min"
    save_top_k: 3
    every_n_epochs: 1
    always_save_nemo: true
    save_last: true

  resume_if_exists: false
  resume_ignore_no_checkpoint: true

early_stopping:
  monitor: "val_wer"
  patience: 5
  mode: "min"
  min_delta: 0.001
