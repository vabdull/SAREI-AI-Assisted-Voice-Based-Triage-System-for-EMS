name: "Arabic-FastConformer-Pretrained-EMS-Finetune"

# Arabic pretrained NeMo ASR checkpoint.
# Loaded via ASRModel.from_pretrained(), then fine-tuned on EMS manifests.
pretrained_model_name: "nvidia/stt_ar_fastconformer_hybrid_large_pcd_v1.0"

model:
  sample_rate: 16000

  train_ds:
    manifest_filepath: "manifests_ems_dialects/train_manifest.json"
    sample_rate: ${model.sample_rate}
    batch_size: 8
    num_workers: 4
    pin_memory: true
    trim_silence: false
    max_duration: 20.0
    min_duration: 0.3
    shuffle: true
    is_tarred: false

  validation_ds:
    manifest_filepath: "manifests_ems_dialects/validation_manifest.json"
    sample_rate: ${model.sample_rate}
    batch_size: 8
    num_workers: 4
    pin_memory: true
    max_duration: 20.0
    min_duration: 0.3
    shuffle: false

  test_ds:
    manifest_filepath: "manifests_ems_dialects/test_manifest.json"
    sample_rate: ${model.sample_rate}
    batch_size: 8
    num_workers: 4
    pin_memory: true
    max_duration: 20.0
    min_duration: 0.3
    shuffle: false

  # Fine-tuning optimizer, much gentler than scratch training.
  optim:
    name: adamw
    lr: 5.0e-5
    betas: [0.9, 0.98]
    weight_decay: 1.0e-3
    sched:
      name: CosineAnnealing
      warmup_steps: 200
      warmup_ratio: null
      min_lr: 1.0e-6

trainer:
  devices: 1
  accelerator: "gpu"
  max_epochs: 25
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  precision: "bf16-mixed"
  enable_checkpointing: true
  logger: true
  log_every_n_steps: 25
  val_check_interval: 1.0
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 0
  deterministic: false

exp_manager:
  exp_dir: "experiments"
  name: ${name}
  create_tensorboard_logger: true
  create_wandb_logger: false
  explicit_log_dir: null
  summary_writer_kwargs:
    max_queue: 10
    flush_secs: 30

  checkpoint_callback_params:
    monitor: "val_wer"
    mode: "min"
    save_top_k: 3
    every_n_epochs: 1
    always_save_nemo: true
    save_last: true

  resume_if_exists: false
  resume_ignore_no_checkpoint: true

early_stopping:
  enabled: true
  monitor: "val_wer"
  patience: 6
  mode: "min"
  min_delta: 0.001
